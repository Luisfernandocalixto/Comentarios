<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Increible noche, ¿Qué te parece?">
    <meta property="og:image" content="https://comentarios-aw0x.onrender.com//image/videoframe.webp">
    <meta property="og:description" content="Increible noche, ¿Qué te parece? Agrega un comentario">
    <meta name="description" content="Increible noche, ¿Qué te parece? Agrega un comentario">
    <title>Comentarios</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="shortcut icon" href="/image/videoframe.webp" type="image/x-icon">
    <script type="module" src="/js/main.js"></script>
</head>

<body>
    <header></header>

    <main class="content-main">

        <div class="contentVideo">
            <video src="/video/noche.mp4" autoplay loop muted></video>
        </div>
        <section class="chat">
            <button type="button" name="button" aria-label="show message" class="showMessage">Mostrar
                comentarios</button>
            <ul id="messages" class="isShow">
            </ul>
            <form id="form" class="isShow">
                <input type="text" name="message" id="input" placeholder="Escribe un comentario" autocomplete="off">
                <button type="submit">Enviar</button>

            </form>
        </section>
    </main>

    <footer></footer>
</body>

</html>
