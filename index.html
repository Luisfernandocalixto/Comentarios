<!DOCTYPE html>
<html lang="en">

<head>

    <meta property="og:title" content="Increible noche, ¿Qué te parece?">
    <meta property="og:image" content="/image/videoframe.webp">

    <meta name="description" content="Increible noche, ¿Qué te parece? Agrega un comentario">
    <title>Comentarios</title>
    <link rel="stylesheet" href="./public/css/main.css">
    <link rel="shortcut icon" href="/image/videoframe.webp" type="image/x-icon">

<body>
    <div class="contentVideo">
        <video src="/public/video/noche.mp4" autoplay loop muted></video>
    </div>
    <section class="chat">
        <ul id="messages" class="isShow">
        </ul>
        <form id="form" class="isShow">
            <input type="text" name="message" id="input" placeholder="Escribe un comentario" autocomplete="off">
            <button type="submit">Enviar</button>

        </form>
        <details>
            <summary>Mostrar comentarios</summary>
            <ul id="messages">
            </ul>
            <form id="form">
                <input type="text" name="message" id="input" placeholder="Escribe un comentario" autocomplete="off">
                <button type="submit">Enviar</button>

            </form>
        </details>
    </section>
<script type="module" src="/public/js/main.js"></script>
</body>
